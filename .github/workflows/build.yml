name: build-amd64
# Pure build test: v40's exact source, built on a native-amd64 runner with the
# classic docker builder (not local buildx), to isolate whether the build
# environment is why locally-built images fail on the judge.
on:
  workflow_dispatch:
  push:
    branches: [ci-amd64]

jobs:
  build:
    runs-on: ubuntu-latest   # native linux/amd64
    steps:
      - uses: actions/checkout@v4

      - name: Show builder + arch
        run: |
          uname -m
          docker version --format '{{.Server.Version}}'

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build (classic docker build, layered on v29)
        run: docker build -f Dockerfile -t bismansinghmadaan/frugal-router:v46-ci-identity .

      - name: Push
        run: docker push bismansinghmadaan/frugal-router:v46-ci-identity

      - name: Report digest
        run: docker inspect bismansinghmadaan/frugal-router:v46-ci-identity --format 'Arch={{.Architecture}}/{{.Os}} Id={{.Id}}'
