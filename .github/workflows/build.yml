name: build-amd64
# Native-amd64 clean-machine build test. Builds BOTH:
#   v46-ci-identity  = v40's exact source (pure build test: does a CI rebuild run on the judge?)
#   v46-ci-terse     = v40 source + terse contracts (the actual improvement)
# Classic docker build, ubuntu-latest runner, layered on the proven v29 base.
on:
  workflow_dispatch:
  push:
    branches: [ci-amd64]

jobs:
  build:
    runs-on: ubuntu-latest   # native linux/amd64
    steps:
      - uses: actions/checkout@v4

      - name: Show builder + arch
        run: |
          uname -m
          docker version --format 'Server={{.Server.Version}}'

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build v46-ci-identity (v40 exact source)
        run: docker build -f Dockerfile -t bismansinghmadaan/frugal-router:v46-ci-identity .

      - name: Push identity
        run: docker push bismansinghmadaan/frugal-router:v46-ci-identity

      - name: Swap in terse contracts
        run: cp terse_simple.py src/frugal_router/simple.py

      - name: Build v46-ci-terse (v40 source + terse contracts)
        run: docker build -f Dockerfile -t bismansinghmadaan/frugal-router:v46-ci-terse .

      - name: Push terse
        run: docker push bismansinghmadaan/frugal-router:v46-ci-terse

      - name: Report
        run: |
          docker inspect bismansinghmadaan/frugal-router:v46-ci-identity --format 'identity {{.Architecture}}/{{.Os}} {{.Id}}'
          docker inspect bismansinghmadaan/frugal-router:v46-ci-terse    --format 'terse    {{.Architecture}}/{{.Os}} {{.Id}}'
