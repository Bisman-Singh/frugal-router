# v5 max-accuracy config. The entire leaderboard is failing the accuracy gate,
# so below the gate tokens are irrelevant: the only goal is correctness. Route
# every non-solver task to the strongest Fireworks model with generous budgets
# and full reasoning; keep the always-correct deterministic solvers for free.
# Token efficiency is re-introduced only once something clears the gate.

local:
  model_path: ""         # no local model: a small model only lowers accuracy

remote:
  base_url: https://api.fireworks.ai/inference/v1
  default_model: ""      # resolved from ALLOWED_MODELS at runtime
  timeout_s: 28
  max_retries: 1

router:
  answer_source: fireworks
  solver_mode: off       # v6: EVERY task through Fireworks (guide: all inference via FIREWORKS_BASE_URL)
  weights: { agreement: 0.6, logprob: 0.25, predictor: 0.15 }
  predictor_path: artifacts/predictor.joblib

scheduler:
  time_budget_s: 555
  est_full_s: 6
  est_greedy_s: 4
  est_remote_s: 4
  max_workers: 6         # pure remote: parallelise to stay well under 10 min

policies:
  defaults:
    n_samples: 1
    local_max_tokens: 512
    escalation_threshold: 0.0
    remote_reasoning_effort: high    # accuracy over tokens while below the gate
    remote_model_hints: [gemma-4-31b-it, gemma]
    remote_max_tokens: 1024
    always_remote: true
  per_type:
    factual:
      always_remote: true
      remote_max_tokens: 768
      remote_model_hints: [gemma-4-31b-it, gemma]
    math:
      always_remote: true
      remote_cot: true
      remote_reasoning_effort: high
      remote_max_tokens: 2048        # room for reasoning tokens + the answer
      remote_model_hints: [minimax, gemma-4-31b-it, gemma]
    sentiment:
      always_remote: true
      remote_max_tokens: 512
      remote_model_hints: [gemma-4-31b-it, gemma]
    summarization:
      always_remote: true
      allow_compression: false
      remote_max_tokens: 768
      remote_model_hints: [gemma-4-31b-it, gemma]
    ner:
      always_remote: true
      remote_max_tokens: 768
      remote_model_hints: [gemma-4-31b-it, gemma]
    logic:
      always_remote: true
      remote_cot: true
      remote_reasoning_effort: high
      remote_max_tokens: 2048
      remote_model_hints: [minimax, gemma-4-31b-it, gemma]
    code_debug:
      always_remote: true
      remote_max_tokens: 2048
      remote_model_hints: [kimi-k2p7-code, code, kimi, gemma-4-31b-it]
    code_gen:
      always_remote: true
      remote_max_tokens: 2048
      remote_model_hints: [kimi-k2p7-code, code, kimi, gemma-4-31b-it]
